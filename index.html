<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BizPRO - Smart Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 紙吹雪ライブラリ -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        .hidden { display: none; }
        /* スライドインアニメーション */
        .slide-in { animation: slideIn 0.3s ease-out forwards; }
        @keyframes slideIn {
            from { opacity: 0; transform: translateX(30px); }
            to { opacity: 1; transform: translateX(0); }
        }
        /* ボタンの押し心地 */
        .btn-push { transition: all 0.1s; }
        .btn-push:active { transform: scale(0.95); filter: brightness(0.9); }
        /* ぼかし背景（グラスモーフィズム） */
        .glass { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(10px); }
    </style>
</head>
<body class="bg-slate-50 min-h-screen flex justify-center items-start font-sans text-slate-900 select-none">

    <div id="app" class="max-w-md w-full bg-white min-h-[100dvh] sm:min-h-[700px] sm:mt-4 sm:rounded-[3rem] shadow-2xl overflow-hidden flex flex-col border border-slate-200">
        
        <!-- HEADER -->
        <div class="bg-slate-900 p-8 text-white text-center relative">
            <h1 class="text-2xl font-black italic tracking-tighter text-indigo-400">BIZPRO</h1>
            <p id="header-subtitle" class="text-[10px] text-slate-500 uppercase tracking-widest mt-1">Mastering Nuance</p>
            <div id="progress-bar-top" class="absolute bottom-0 left-0 h-1 bg-indigo-500 transition-all duration-500" style="width: 0%"></div>
        </div>

        <div class="p-6 flex-1 flex flex-col">
            <!-- 1. MENU SCREEN -->
            <div id="menu-screen" class="slide-in space-y-4">
                <div class="flex items-center justify-between mb-2">
                    <p class="text-xs font-bold text-slate-400 uppercase tracking-widest">Training Categories</p>
                    <span class="text-[10px] bg-slate-100 px-2 py-1 rounded-full text-slate-500">v2.5</span>
                </div>
                <div id="category-list" class="grid grid-cols-1 gap-3 text-sm">
                    <div class="animate-pulse flex space-y-4 flex-col">
                        <div class="h-16 bg-slate-100 rounded-2xl"></div>
                        <div class="h-16 bg-slate-100 rounded-2xl"></div>
                    </div>
                </div>
            </div>

            <!-- 2. QUIZ SCREEN -->
            <div id="quiz-screen" class="hidden slide-in flex-1 flex flex-col">
                <div class="flex justify-between items-center mb-4">
                    <button onclick="location.reload()" class="text-slate-400 text-xs">← Exit</button>
                    <span id="q-counter" class="text-xs font-mono font-bold text-indigo-500"></span>
                </div>
                <div id="dialogue-box" class="mb-6 p-5 bg-indigo-50 rounded-3xl border border-indigo-100 text-sm italic text-indigo-900 leading-relaxed relative">
                    <span class="absolute -top-2 left-4 bg-white px-2 text-[10px] font-bold text-indigo-300 border border-indigo-100 rounded">CONTEXT</span>
                </div>
                <p id="question-text" class="text-xl font-bold text-slate-800 mb-8 leading-tight"></p>
                <div id="choice-area" class="space-y-3"></div>
            </div>

            <!-- 3. FEEDBACK SCREEN -->
            <div id="feedback-screen" class="hidden slide-in text-center">
                <div id="result-card" class="p-8 rounded-[2.5rem] mb-6 border-4 text-left shadow-xl">
                    <h2 id="result-title" class="text-3xl font-black mb-4 italic"></h2>
                    <div class="bg-white/50 p-5 rounded-2xl mb-4 border border-white/50">
                        <p id="full-sentence" class="text-slate-800 font-bold text-lg leading-relaxed"></p>
                    </div>
                    <p id="explanation-text" class="text-sm text-slate-700 leading-relaxed"></p>
                </div>
                <button onclick="nextQuestion()" class="btn-push w-full bg-slate-900 text-white py-6 rounded-2xl font-black shadow-2xl">CONTINUE</button>
            </div>

            <!-- 4. SUMMARY SCREEN -->
            <div id="summary-screen" class="hidden slide-in text-center py-10">
                <div class="text-6xl mb-4">⭐</div>
                <h2 id="rank-title" class="text-3xl font-black mb-2 uppercase">Executive</h2>
                <p id="summary-text" class="text-slate-500 mb-10"></p>
                <button onclick="location.reload()" class="btn-push w-full bg-indigo-600 text-white py-6 rounded-2xl font-black shadow-lg">FINISH SESSION</button>
            </div>
        </div>
    </div>

    <script>
        let allQuestions = [];
        let activePool = [];
        let currentIdx = 0;
        let score = 0;

        async function loadData() {
            try {
                const response = await fetch('quiz.json');
                allQuestions = await response.json();
                renderMenu();
            } catch (e) {
                document.getElementById('category-list').innerHTML = `<p class='text-red-400'>Error loading quiz.json</p>`;
            }
        }

        function renderMenu() {
            const categories = [...new Set(allQuestions.map(q => q.category))];
            const list = document.getElementById('category-list');
            list.innerHTML = '';
            categories.forEach(cat => {
                const count = allQuestions.filter(q => q.category === cat).length;
                const btn = document.createElement('button');
                btn.className = "btn-push w-full flex justify-between items-center p-6 bg-white border border-slate-200 rounded-[1.5rem] shadow-sm hover:border-indigo-400";
                btn.innerHTML = `<div><span class="block font-bold text-slate-800">${cat}</span><span class="text-[10px] text-slate-400 font-bold uppercase tracking-widest">${count} Questions</span></div><span class="text-indigo-200">❯</span>`;
                btn.onclick = () => { triggerVibrate(10); startQuiz(cat); };
                list.appendChild(btn);
            });
        }

        function startQuiz(category) {
            activePool = allQuestions.filter(q => q.category === category);
            currentIdx = 0;
            score = 0;
            document.getElementById('menu-screen').classList.add('hidden');
            document.getElementById('quiz-screen').classList.remove('hidden');
            showQuestion();
        }

        function showQuestion() {
            const data = activePool[currentIdx];
            document.getElementById('q-counter').innerText = `${currentIdx + 1} / ${activePool.length}`;
            document.getElementById('dialogue-box').innerText = data.dialogue;
            document.getElementById('question-text').innerText = data.q;
            document.getElementById('progress-bar-top').style.width = `${((currentIdx) / activePool.length) * 100}%`;
            
            const area = document.getElementById('choice-area');
            area.innerHTML = '';
            data.choices.forEach(c => {
                const b = document.createElement('button');
                b.className = "btn-push w-full text-left p-5 bg-white border-2 border-slate-100 rounded-2xl font-bold shadow-sm";
                b.innerText = c;
                b.onclick = () => checkAnswer(c);
                area.appendChild(b);
            });
        }

        function checkAnswer(val) {
            const data = activePool[currentIdx];
            const isCorrect = val.trim().toLowerCase() === data.a.toLowerCase();
            
            if (isCorrect) {
                score++;
                triggerVibrate([20, 10, 20]); // 正解時のリズム刻み
                confetti({ particleCount: 100, spread: 70, origin: { y: 0.6 }, colors: ['#6366f1', '#a5b4fc', '#ffffff'] });
            } else {
                triggerVibrate(100); // 不正解時は長めの振動
            }

            document.getElementById('quiz-screen').classList.add('hidden');
            document.getElementById('feedback-screen').classList.remove('hidden');
            
            const card = document.getElementById('result-card');
            document.getElementById('result-title').innerText = isCorrect ? "GREAT!" : "Ouch!";
            card.style.borderColor = isCorrect ? "#10b981" : "#f43f5e";
            card.style.backgroundColor = isCorrect ? "#ecfdf5" : "#fff1f2";
            
            document.getElementById('full-sentence').innerText = data.q.replace("(      )", data.a);
            document.getElementById('explanation-text').innerText = data.exp;
        }

        function nextQuestion() {
            currentIdx++;
            if (currentIdx >= activePool.length) {
                showSummary();
            } else {
                document.getElementById('feedback-screen').classList.add('hidden');
                document.getElementById('quiz-screen').classList.remove('hidden');
                showQuestion();
            }
        }

        function showSummary() {
            document.getElementById('feedback-screen').classList.add('hidden');
            document.getElementById('summary-screen').classList.remove('hidden');
            document.getElementById('progress-bar-top').style.width = `100%`;
            
            const rate = score / activePool.length;
            let rank = "Beginner";
            if(rate === 1) rank = "Executive VP";
            else if(rate >= 0.7) rank = "Director";
            else if(rate >= 0.4) rank = "Manager";

            document.getElementById('rank-title').innerText = rank;
            document.getElementById('summary-text').innerText = `You mastered ${score} out of ${activePool.length} nuances.`;
        }

        function triggerVibrate(pattern) {
            if (navigator.vibrate) navigator.vibrate(pattern);
        }

        loadData();
    </script>
</body>
</html>
