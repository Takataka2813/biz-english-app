<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BizPro English | Premium</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #4f46e5;
            --primary-soft: rgba(79, 70, 229, 0.1);
            --secondary: #9333ea;
            --bg: #fdfdff;
            --surface: #ffffff;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --correct: #10b981;
            --wrong: #f43f5e;
            --nav-bg: rgba(255, 255, 255, 0.85);
            --card-shadow: 0 8px 30px rgba(0,0,0,0.04);
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            color: var(--text-main);
            -webkit-tap-highlight-color: transparent;
        }

        #app {
            background: var(--surface);
            width: 100%;
            max-width: 480px;
            min-height: 100vh;
            padding-bottom: 90px;
            box-sizing: border-box;
            position: relative;
        }

        .screen {
            padding: 30px 24px;
            animation: slideIn 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .hidden { display: none !important; }

        /* Typography */
        .brand {
            font-size: 26px;
            font-weight: 800;
            letter-spacing: -0.5px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 4px;
        }

        .section-title {
            font-size: 20px;
            font-weight: 700;
            margin: 32px 0 20px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* Navigation Bar (Glassmorphism) */
        .bottom-nav {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: calc(100% - 40px);
            max-width: 440px;
            height: 64px;
            background: var(--nav-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            display: flex;
            justify-content: space-around;
            align-items: center;
            border-radius: 24px;
            border: 1px solid rgba(255,255,255,0.3);
            box-shadow: 0 10px 40px rgba(0,0,0,0.08);
            z-index: 1000;
        }

        .nav-item {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            color: var(--text-muted);
            cursor: pointer;
            font-size: 10px;
            font-weight: 600;
            transition: 0.3s;
        }

        .nav-item.active { color: var(--primary); }
        .nav-icon { font-size: 22px; transition: transform 0.2s; }
        .nav-item.active .nav-icon { transform: translateY(-2px); }

        /* Cards & Buttons */
        .level-card {
            background: var(--surface);
            border: 1px solid #f1f5f9;
            padding: 24px;
            border-radius: 20px;
            margin-bottom: 16px;
            box-shadow: var(--card-shadow);
            display: flex;
            align-items: center;
            justify-content: space-between;
            cursor: pointer;
            transition: 0.2s;
        }

        .level-card:active { transform: scale(0.97); background: #f8fafc; }

        .btn-theme {
            background: #f8fafc;
            border: 1px solid #f1f5f9;
            padding: 18px;
            border-radius: 16px;
            font-weight: 600;
            margin-bottom: 12px;
            text-align: left;
            width: 100%;
            display: block;
            box-sizing: border-box;
            cursor: pointer;
            transition: 0.2s;
        }

        .btn-theme:hover { border-color: var(--primary); background: var(--primary-soft); }

        .btn-main {
            background: var(--primary);
            color: white;
            padding: 18px;
            border-radius: 16px;
            font-weight: 700;
            text-align: center;
            border: none;
            width: 100%;
            margin-top: 10px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(79, 70, 229, 0.3);
        }

        /* Stats & Mastery */
        .stats-row {
            display: flex;
            gap: 12px;
            margin-bottom: 24px;
        }

        .stat-box {
            flex: 1;
            background: linear-gradient(135deg, #ffffff, #f8faff);
            padding: 20px;
            border-radius: 20px;
            border: 1px solid #eef2ff;
            box-shadow: var(--card-shadow);
        }

        .stat-val { font-size: 28px; font-weight: 800; color: var(--primary); }
        .stat-label { font-size: 12px; color: var(--text-muted); font-weight: 500; }

        .mastery-card {
            background: white;
            padding: 20px;
            border-radius: 20px;
            margin-bottom: 16px;
            border: 1px solid #f1f5f9;
            box-shadow: var(--card-shadow);
        }

        .progress-track {
            height: 8px;
            background: #f1f5f9;
            border-radius: 4px;
            overflow: hidden;
            margin-top: 12px;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(to right, var(--primary), var(--secondary));
            border-radius: 4px;
            transition: width 0.8s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        /* Quiz UI */
        .quiz-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 24px; }
        .back-btn { font-size: 24px; cursor: pointer; color: var(--text-muted); }
        
        .question-card {
            background: white;
            border-radius: 24px;
            padding: 4px;
        }

        .dialogue-text {
            background: var(--primary-soft);
            color: var(--primary);
            padding: 16px;
            border-radius: 16px;
            font-size: 14px;
            line-height: 1.5;
            margin-bottom: 20px;
            font-weight: 500;
        }

        .choice-item {
            background: #ffffff;
            border: 2px solid #f1f5f9;
            padding: 16px 20px;
            border-radius: 16px;
            margin-bottom: 12px;
            font-weight: 500;
            cursor: pointer;
            transition: 0.2s;
        }

        .choice-item.correct { background: var(--correct) !important; color: white; border-color: var(--correct); }
        .choice-item.wrong { background: var(--wrong) !important; color: white; border-color: var(--wrong); }

        #feedback-area {
            position: fixed;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%);
            width: calc(100% - 48px);
            max-width: 432px;
            background: white;
            padding: 24px;
            border-radius: 24px;
            box-shadow: 0 -10px 40px rgba(0,0,0,0.1);
            z-index: 100;
            animation: slideUp 0.3s ease-out;
        }

        @keyframes slideUp { from { transform: translate(-50%, 100%); } to { transform: translate(-50%, 0); } }

    </style>
</head>
<body>

<div id="app">
    <!-- Home Screen -->
    <div id="screen-home" class="screen">
        <div class="brand">BizPro English</div>
        <p style="color: var(--text-muted); font-size: 15px;">キャリアを加速させる英語学習</p>
        
        <h2 class="section-title">コースを選択</h2>
        <div class="level-card" onclick="selectCourse('beginner')">
            <div><b style="font-size: 18px;">Beginner</b><br><small style="color:var(--text-muted)">基礎から学ぶビジネス英語</small></div>
            <span style="font-size: 24px;">🟢</span>
        </div>
        <div class="level-card" onclick="selectCourse('intermediate')">
            <div><b style="font-size: 18px;">Intermediate</b><br><small style="color:var(--text-muted)">実戦的な交渉と会議</small></div>
            <span style="font-size: 24px;">🟡</span>
        </div>
        <div class="level-card" onclick="selectCourse('advanced')">
            <div><b style="font-size: 18px;">Advanced</b><br><small style="color:var(--text-muted)">高度なプレゼンと言い回し</small></div>
            <span style="font-size: 24px;">🔴</span>
        </div>
    </div>

    <!-- Theme Screen -->
    <div id="screen-theme" class="screen hidden">
        <div class="quiz-header">
            <span class="back-btn" onclick="showScreen('home')">←</span>
            <span style="font-weight: 700;" id="theme-level-name">Theme</span>
            <div style="width:24px;"></div>
        </div>
        <div id="theme-list" style="margin-top: 20px;"></div>
    </div>

    <!-- Quiz Screen -->
    <div id="screen-quiz" class="screen hidden">
        <div class="quiz-header">
            <span class="back-btn" onclick="showScreen('home')">✕</span>
            <div style="flex:1; margin: 0 20px;">
                <div class="progress-track"><div id="quiz-progress-fill" class="progress-fill" style="width: 0%"></div></div>
            </div>
            <span id="quiz-count-text" style="font-size: 12px; font-weight: 700; color: var(--text-muted);">1/10</span>
        </div>

        <div class="question-card">
            <div id="dialogue-box" class="dialogue-text"></div>
            <div id="q-text" style="font-size: 20px; font-weight: 700; margin-bottom: 24px; line-height: 1.4;"></div>
            <div id="choices-container"></div>
        </div>

        <div id="feedback-area" class="hidden">
            <div style="display: flex; gap: 12px; align-items: flex-start; margin-bottom: 16px;">
                <div id="res-icon" style="font-size: 24px;"></div>
                <div>
                    <div id="res-title" style="font-weight: 800; font-size: 18px;"></div>
                    <div id="res-exp" style="font-size: 14px; color: var(--text-muted); margin-top: 4px; line-height: 1.5;"></div>
                </div>
            </div>
            <button class="btn-main" onclick="nextQuestion()">次へ進む</button>
        </div>
    </div>

    <!-- Stats Screen -->
    <div id="screen-stats" class="screen hidden">
        <div class="brand">My Progress</div>
        <div class="stats-row" style="margin-top: 24px;">
            <div class="stat-box">
                <div class="stat-val" id="stat-days">0</div>
                <div class="stat-label">学習日数</div>
            </div>
            <div class="stat-box">
                <div class="stat-val" id="stat-count">0</div>
                <div class="stat-label">完了クイズ</div>
            </div>
        </div>

        <h2 class="section-title">コース習熟度</h2>
        <div id="mastery-container">
            <div class="mastery-card">
                <div style="display: flex; justify-content: space-between; font-weight: 700;"><span>Beginner</span><span id="m-beginner-val">0%</span></div>
                <div class="progress-track"><div id="m-beginner-bar" class="progress-fill" style="width: 0%"></div></div>
            </div>
            <div class="mastery-card">
                <div style="display: flex; justify-content: space-between; font-weight: 700;"><span>Intermediate</span><span id="m-intermediate-val">0%</span></div>
                <div class="progress-track"><div id="m-intermediate-bar" class="progress-fill" style="width: 0%"></div></div>
            </div>
            <div class="mastery-card">
                <div style="display: flex; justify-content: space-between; font-weight: 700;"><span>Advanced</span><span id="m-advanced-val">0%</span></div>
                <div class="progress-track"><div id="m-advanced-bar" class="progress-fill" style="width: 0%"></div></div>
            </div>
        </div>
    </div>

    <!-- Navigation -->
    <nav class="bottom-nav">
        <div class="nav-item active" id="nav-home" onclick="showScreen('home')">
            <span class="nav-icon">🏠</span>
            <span>ホーム</span>
        </div>
        <div class="nav-item" id="nav-stats" onclick="showScreen('stats')">
            <span class="nav-icon">📊</span>
            <span>レポート</span>
        </div>
    </nav>
</div>

<script>
    let allData = [];
    let currentQuestions = [];
    let currentIndex = 0;
    let score = 0;
    let currentLevel = '';

    // Data Load
    let stats = JSON.parse(localStorage.getItem('bizpro_v2_stats')) || {
        days: 1, lastLogin: new Date().toDateString(), quizCount: 0,
        mastery: { beginner: 0, intermediate: 0, advanced: 0 }
    };

    if (stats.lastLogin !== new Date().toDateString()) {
        stats.days++;
        stats.lastLogin = new Date().toDateString();
        save();
    }

    function save() { localStorage.setItem('bizpro_v2_stats', JSON.stringify(stats)); }

    function showScreen(name) {
        document.querySelectorAll('.screen').forEach(s => s.classList.add('hidden'));
        document.getElementById(`screen-${name}`).classList.remove('hidden');
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        if(['home', 'theme', 'quiz'].includes(name)) document.getElementById('nav-home').classList.add('active');
        else document.getElementById(`nav-${name}`).classList.add('active');
        if(name === 'stats') updateStatsUI();
        window.scrollTo(0,0);
    }

    function updateStatsUI() {
        document.getElementById('stat-days').innerText = stats.days;
        document.getElementById('stat-count').innerText = stats.quizCount;
        ['beginner', 'intermediate', 'advanced'].forEach(l => {
            const v = stats.mastery[l] || 0;
            document.getElementById(`m-${l}-val`).innerText = v + '%';
            document.getElementById(`m-${l}-bar`).style.width = v + '%';
        });
    }

    async function selectCourse(level) {
        currentLevel = level;
        try {
            const res = await fetch(`data/${level}.json`);
            allData = await res.json();
            document.getElementById('theme-level-name').innerText = level.toUpperCase();
            generateThemes();
            showScreen('theme');
        } catch (e) { alert("Data load error. Check data/ folder."); }
    }

    function generateThemes() {
        const list = document.getElementById('theme-list');
        list.innerHTML = "";
        const cats = [...new Set(allData.map(q => q.category))].sort();
        cats.forEach(c => {
            const b = document.createElement('div');
            b.className = "btn-theme";
            b.innerText = c;
            b.onclick = () => startQuiz(c);
            list.appendChild(b);
        });
        const all = document.createElement('button');
        all.className = "btn-main";
        all.innerText = "すべてのテーマをシャッフル";
        all.onclick = () => startQuiz('ALL');
        list.appendChild(all);
    }

    function startQuiz(cat) {
        currentQuestions = cat === 'ALL' ? [...allData] : allData.filter(q => q.category === cat);
        currentQuestions.sort(() => Math.random() - 0.5);
        currentQuestions = currentQuestions.slice(0, 10);
        currentIndex = 0; score = 0;
        showScreen('quiz');
        showQuestion();
    }

    function showQuestion() {
        const q = currentQuestions[currentIndex];
        document.getElementById('quiz-progress-fill').style.width = (currentIndex / 10 * 100) + "%";
        document.getElementById('quiz-count-text').innerText = `${currentIndex + 1}/10`;
        document.getElementById('dialogue-box').innerText = q.dialogue;
        document.getElementById('q-text').innerText = q.q;
        document.getElementById('feedback-area').classList.add('hidden');
        
        const container = document.getElementById('choices-container');
        container.innerHTML = "";
        q.choices.forEach(c => {
            const div = document.createElement('div');
            div.className = "choice-item";
            div.innerText = c;
            div.onclick = () => check(c, div);
            container.appendChild(div);
        });
    }

    function check(choice, el) {
        const q = currentQuestions[currentIndex];
        const all = document.querySelectorAll('.choice-item');
        all.forEach(b => b.style.pointerEvents = "none");

        if (choice === q.a) {
            el.classList.add('correct');
            document.getElementById('res-icon').innerText = "✨";
            document.getElementById('res-title').innerText = "Correct!";
            score++;
        } else {
            el.classList.add('wrong');
            document.getElementById('res-icon').innerText = "💡";
            document.getElementById('res-title').innerText = "Incorrect";
            all.forEach(b => { if(b.innerText === q.a) b.classList.add('correct'); });
        }
        document.getElementById('res-exp').innerText = q.exp;
        document.getElementById('feedback-area').classList.remove('hidden');
    }

    function nextQuestion() {
        currentIndex++;
        if (currentIndex < 10) showQuestion();
        else finish();
    }

    function finish() {
        stats.quizCount++;
        const currentM = stats.mastery[currentLevel] || 0;
        stats.mastery[currentLevel] = Math.min(100, Math.round(currentM + (score * 1))); // 正解数に応じてUP
        save();
        alert(`完了！ スコア: ${score}/10`);
        showScreen('home');
    }
</script>

</body>
</html>
