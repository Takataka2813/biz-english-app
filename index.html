<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BizPRO - Neo Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%);
            -webkit-tap-highlight-color: transparent;
        }

        .hidden { display: none; }

        /* 滑らかなフェード&アップ遷移 */
        .page-transition {
            animation: appAppear 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }
        @keyframes appAppear {
            from { opacity: 0; transform: translateY(15px) scale(0.98); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        /* グラスモーフィズム（透過背景） */
        .glass-card {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.5);
        }

        /* プレミアムな影 */
        .soft-shadow {
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.05), 0 10px 10px -5px rgba(0, 0, 0, 0.02);
        }

        /* ボタンの波紋のようなアニメーション */
        .btn-premium {
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .btn-premium:active {
            transform: scale(0.97);
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.06);
        }

        /* プログレスバーのネオンエフェクト */
        #top-progress {
            box-shadow: 0 0 8px rgba(99, 102, 241, 0.6);
        }
    </style>
</head>
<body class="min-h-screen flex justify-center items-center p-0 sm:p-4">

    <div id="app" class="relative max-w-md w-full h-[100dvh] sm:h-[800px] bg-slate-50/50 sm:rounded-[3.5rem] sm:shadow-[0_32px_64px_-15px_rgba(0,0,0,0.15)] overflow-hidden flex flex-col border border-white/20">
        
        <!-- 背景のデコレーション（スタイリッシュな光の玉） -->
        <div class="absolute -top-24 -right-24 w-64 h-64 bg-indigo-200/30 rounded-full blur-3xl -z-10"></div>
        <div class="absolute -bottom-24 -left-24 w-64 h-64 bg-blue-200/20 rounded-full blur-3xl -z-10"></div>

        <!-- HEADER -->
        <header class="pt-12 pb-6 px-8 flex justify-between items-end">
            <div>
                <h1 class="text-3xl font-[900] tracking-tighter text-slate-900 leading-none">BizPRO<span class="text-indigo-600">.</span></h1>
                <p id="header-subtitle" class="text-[11px] font-bold text-slate-400 uppercase tracking-[0.2em] mt-2">Smart Learning</p>
            </div>
            <div class="h-10 w-10 rounded-2xl bg-white shadow-sm flex items-center justify-center border border-slate-100">
                <span class="text-lg">🎧</span>
            </div>
        </header>

        <!-- PROGRESS -->
        <div class="px-8 mb-4">
            <div class="w-full h-1.5 bg-slate-200 rounded-full overflow-hidden">
                <div id="top-progress" class="h-full bg-indigo-600 transition-all duration-1000 ease-out" style="width: 0%"></div>
            </div>
        </div>

        <main class="flex-1 px-6 pb-8 overflow-y-auto">
            <!-- 1. MENU SCREEN -->
            <div id="menu-screen" class="page-transition space-y-6 pt-4">
                <div id="category-list" class="grid gap-4">
                    <!-- JSで挿入 -->
                </div>
            </div>

            <!-- 2. QUIZ SCREEN -->
            <div id="quiz-screen" class="hidden page-transition flex flex-col h-full">
                <div id="q-counter" class="text-[10px] font-black text-indigo-500 uppercase tracking-widest mb-4">Question 1 of 10</div>
                
                <div class="glass-card p-6 rounded-[2.5rem] mb-8 soft-shadow">
                    <p id="dialogue-text" class="text-slate-600 italic text-[15px] leading-relaxed"></p>
                </div>

                <p id="question-text" class="text-2xl font-bold text-slate-800 mb-8 leading-tight"></p>

                <div id="choice-area" class="space-y-4"></div>
            </div>

            <!-- 3. FEEDBACK SCREEN -->
            <div id="feedback-screen" class="hidden page-transition flex flex-col h-full">
                <div id="result-card" class="glass-card p-8 rounded-[3rem] soft-shadow flex-1 flex flex-col border-t-4">
                    <div class="flex justify-between items-start mb-6">
                        <h2 id="result-title" class="text-4xl font-black italic tracking-tighter"></h2>
                        <button onclick="speakAnswer()" class="btn-premium bg-white p-4 rounded-2xl shadow-sm text-xl border border-slate-100">🔊</button>
                    </div>
                    
                    <div class="mb-6">
                        <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2">Model Sentence</p>
                        <p id="full-sentence" class="text-slate-900 font-bold text-xl leading-snug"></p>
                    </div>
                    
                    <div>
                        <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2">Nuance Note</p>
                        <p id="explanation-text" class="text-slate-600 text-[14px] leading-relaxed"></p>
                    </div>
                </div>
                <button onclick="nextQuestion()" class="btn-premium w-full bg-slate-900 text-white py-6 rounded-[2rem] font-bold shadow-2xl mt-6 tracking-wide">CONTINUE</button>
            </div>

            <!-- 4. SUMMARY SCREEN -->
            <div id="summary-screen" class="hidden page-transition text-center py-10 flex flex-col items-center justify-center h-full">
                <div class="w-32 h-32 bg-indigo-600 rounded-[3rem] flex items-center justify-center text-5xl mb-8 shadow-[0_20px_50px_rgba(79,70,229,0.3)]">🏆</div>
                <h2 id="rank-title" class="text-4xl font-[900] text-slate-900 mb-2"></h2>
                <p id="summary-text" class="text-slate-500 mb-12"></p>
                <button onclick="location.reload()" class="btn-premium w-full bg-white border border-slate-200 text-slate-900 py-6 rounded-[2rem] font-bold shadow-sm">BACK TO MENU</button>
            </div>
        </main>
    </div>

    <script>
        let allQuestions = [];
        let activePool = [];
        let currentIdx = 0;
        let score = 0;

        function speakAnswer() {
            const data = activePool[currentIdx];
            const uttr = new SpeechSynthesisUtterance(data.q.replace("(      )", data.a));
            uttr.lang = 'en-US';
            uttr.rate = 0.85;
            speechSynthesis.speak(uttr);
        }

        async function loadData() {
            try {
                const response = await fetch('quiz.json');
                allQuestions = await response.json();
                renderMenu();
            } catch (e) { console.error("Data load failed."); }
        }

        function renderMenu() {
            const categories = [...new Set(allQuestions.map(q => q.category))];
            const list = document.getElementById('category-list');
            list.innerHTML = '';
            categories.forEach(cat => {
                const count = allQuestions.filter(q => q.category === cat).length;
                const btn = document.createElement('button');
                btn.className = "btn-premium glass-card w-full flex justify-between items-center p-7 rounded-[2.5rem] text-left hover:bg-white transition-all";
                btn.innerHTML = `
                    <div>
                        <span class="block font-bold text-slate-900 text-lg">${cat}</span>
                        <span class="text-[10px] font-bold text-slate-400 uppercase tracking-[0.1em] mt-1 inline-block">${count} Exercises</span>
                    </div>
                    <div class="w-10 h-10 rounded-full bg-slate-100 flex items-center justify-center text-slate-300">❯</div>`;
                btn.onclick = () => startQuiz(cat);
                list.appendChild(btn);
            });
        }

        function startQuiz(category) {
            activePool = allQuestions.filter(q => q.category === category);
            currentIdx = 0; score = 0;
            document.getElementById('menu-screen').classList.add('hidden');
            document.getElementById('quiz-screen').classList.remove('hidden');
            showQuestion();
        }

        function showQuestion() {
            const data = activePool[currentIdx];
            document.getElementById('q-counter').innerText = `Question ${currentIdx + 1} of ${activePool.length}`;
            document.getElementById('dialogue-text').innerText = data.dialogue;
            document.getElementById('question-text').innerText = data.q;
            document.getElementById('top-progress').style.width = `${(currentIdx / activePool.length) * 100}%`;
            
            const area = document.getElementById('choice-area');
            area.innerHTML = '';
            data.choices.forEach(c => {
                const b = document.createElement('button');
                b.className = "btn-premium w-full text-left p-6 bg-white border border-slate-100 rounded-[1.8rem] font-bold shadow-sm text-slate-700 hover:border-indigo-300 hover:text-indigo-600";
                b.innerText = c;
                b.onclick = () => checkAnswer(c);
                area.appendChild(b);
            });
        }

        function checkAnswer(val) {
            const data = activePool[currentIdx];
            const isCorrect = val.trim().toLowerCase() === data.a.toLowerCase();
            if (isCorrect) {
                score++;
                confetti({ particleCount: 150, spread: 70, origin: { y: 0.7 }, colors: ['#4f46e5', '#38bdf8'] });
                if(navigator.vibrate) navigator.vibrate([20, 10, 20]);
            } else {
                if(navigator.vibrate) navigator.vibrate(80);
            }

            document.getElementById('quiz-screen').classList.add('hidden');
            document.getElementById('feedback-screen').classList.remove('hidden');
            
            const card = document.getElementById('result-card');
            document.getElementById('result-title').innerText = isCorrect ? "PERFECT" : "NOT QUITE";
            document.getElementById('result-title').style.color = isCorrect ? "#10b981" : "#f43f5e";
            card.style.borderTopColor = isCorrect ? "#10b981" : "#f43f5e";
            
            document.getElementById('full-sentence').innerText = data.q.replace("(      )", data.a);
            document.getElementById('explanation-text').innerText = data.exp;
            speakAnswer();
        }

        function nextQuestion() {
            currentIdx++;
            if (currentIdx >= activePool.length) showSummary();
            else {
                document.getElementById('feedback-screen').classList.add('hidden');
                document.getElementById('quiz-screen').classList.remove('hidden');
                showQuestion();
            }
        }

        function showSummary() {
            document.getElementById('feedback-screen').classList.add('hidden');
            document.getElementById('summary-screen').classList.remove('hidden');
            document.getElementById('top-progress').style.width = "100%";
            const rate = score / activePool.length;
            document.getElementById('rank-title').innerText = rate === 1 ? "ELITE" : "SOLID";
            document.getElementById('summary-text').innerText = `You scored ${score}/${activePool.length}.`;
        }

        loadData();
    </script>
</body>
</html>
