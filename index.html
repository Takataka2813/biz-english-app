<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BizPro - ビジネス英語クイズ</title>
    <style>
        body { font-family: sans-serif; background: #f0f2f5; display: flex; justify-content: center; padding: 20px; }
        #app { background: white; width: 100%; max-width: 500px; padding: 20px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .hidden { display: none; }
        h1 { font-size: 1.2rem; color: #1a73e8; text-align: center; }
        .btn { display: block; width: 100%; padding: 12px; margin: 10px 0; border: none; border-radius: 8px; cursor: pointer; font-size: 1rem; transition: 0.2s; }
        .level-btn { background: #e8f0fe; color: #1a73e8; font-weight: bold; border: 2px solid #1a73e8; }
        .level-btn:hover { background: #d2e3fc; }
        .choice-btn { background: #fff; border: 1px solid #ddd; text-align: left; }
        .choice-btn:hover { background: #f8f9fa; border-color: #bbb; }
        .correct { background: #d4edda !important; border-color: #c3e6cb !important; }
        .wrong { background: #f8d7da !important; border-color: #f5c6cb !important; }
        #explanation { background: #fff3cd; padding: 15px; border-radius: 8px; margin-top: 15px; font-size: 0.9rem; line-height: 1.5; }
        .progress { font-size: 0.8rem; color: #666; margin-bottom: 10px; }
    </style>
</head>
<body>

<div id="app">
    <h1>BizPro English</h1>

    <!-- 1. レベル選択画面 -->
    <div id="level-select">
        <p style="text-align:center;">学習するレベルを選択してください</p>
        <button class="btn level-btn" onclick="startQuiz('beginner.json')">初級 (100問)</button>
        <button class="btn level-btn" style="opacity:0.5" disabled>中級 (Coming Soon)</button>
        <button class="btn level-btn" style="opacity:0.5" disabled>上級 (Coming Soon)</button>
    </div>

    <!-- 2. クイズ画面 -->
    <div id="quiz-container" class="hidden">
        <div class="progress">Question: <span id="q-number">1</span> / 100</div>
        <div id="category" style="font-weight:bold; color:#555; margin-bottom:5px;"></div>
        <div id="dialogue" style="margin-bottom:15px; font-style:italic; color:#333;"></div>
        <div id="question-text" style="font-size:1.1rem; margin-bottom:20px; font-weight:bold;"></div>
        
        <div id="choices"></div>

        <div id="explanation" class="hidden">
            <strong>【解説】</strong><br>
            <span id="exp-text"></span>
            <button class="btn" style="background:#1a73e8; color:white; margin-top:15px;" onclick="nextQuestion()">次の問題へ</button>
        </div>
    </div>

    <!-- 3. 結果画面 -->
    <div id="result-screen" class="hidden" style="text-align:center;">
        <h2>お疲れ様でした！</h2>
        <p style="font-size:1.5rem;">スコア: <span id="final-score"></span> / 100</p>
        <button class="btn level-btn" onclick="location.reload()">タイトルに戻る</button>
    </div>
</div>

<script>
    let allData = [];
    let currentIndex = 0;
    let score = 0;

    // クイズデータの読み込み開始
    async function startQuiz(fileName) {
        try {
            // dataフォルダ内のファイルを参照
            const response = await fetch(`data/${fileName}`);
            allData = await response.json();
            
            // データをランダムにシャッフル（必要なければコメントアウト）
            allData.sort(() => Math.random() - 0.5);

            document.getElementById('level-select').classList.add('hidden');
            document.getElementById('quiz-container').classList.remove('hidden');
            showQuestion();
        } catch (error) {
            alert("データの読み込みに失敗しました。ファイルが data/ フォルダにあるか確認してください。");
            console.error(error);
        }
    }

    function showQuestion() {
        const data = allData[currentIndex];
        document.getElementById('q-number').innerText = currentIndex + 1;
        document.getElementById('category').innerText = data.category;
        document.getElementById('dialogue').innerText = data.dialogue;
        document.getElementById('question-text').innerText = data.q;
        document.getElementById('explanation').classList.add('hidden');
        
        const choicesDiv = document.getElementById('choices');
        choicesDiv.innerHTML = '';

        data.choices.forEach(choice => {
            const btn = document.createElement('button');
            btn.className = 'btn choice-btn';
            btn.innerText = choice;
            btn.onclick = () => checkAnswer(btn, choice, data.a);
            choicesDiv.appendChild(btn);
        });
    }

    function checkAnswer(btn, selected, correct) {
        const buttons = document.querySelectorAll('.choice-btn');
        buttons.forEach(b => b.disabled = true); // 連続クリック防止

        if (selected === correct) {
            btn.classList.add('correct');
            score++;
        } else {
            btn.classList.add('wrong');
            // 正解のボタンもハイライト
            buttons.forEach(b => { if(b.innerText === correct) b.classList.add('correct'); });
        }

        document.getElementById('exp-text').innerText = allData[currentIndex].exp;
        document.getElementById('explanation').classList.remove('hidden');
    }

    function nextQuestion() {
        currentIndex++;
        if (currentIndex < allData.length) {
            showQuestion();
        } else {
            showResult();
        }
    }

    function showResult() {
        document.getElementById('quiz-container').classList.add('hidden');
        document.getElementById('result-screen').classList.remove('hidden');
        document.getElementById('final-score').innerText = score;
    }
</script>

</body>
</html>
