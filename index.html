<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BizEnglish Pro - Menu System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .hidden { display: none; }
        .fade-in { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body class="bg-slate-100 min-h-screen flex justify-center items-start p-4 font-sans text-slate-900">

    <div id="app" class="max-w-md w-full bg-white rounded-[2.5rem] shadow-2xl overflow-hidden mt-2 border border-slate-200 min-h-[650px] flex flex-col">
        
        <!-- HEADER -->
        <div class="bg-slate-900 p-8 text-white text-center">
            <h1 class="text-2xl font-black italic tracking-tighter text-indigo-400">BIZPRO</h1>
            <p id="header-subtitle" class="text-[10px] text-slate-500 uppercase tracking-widest mt-1">Select Your Situation</p>
        </div>

        <div class="p-6 flex-1 flex flex-col">
            <!-- 1. メニュー画面 (カテゴリー選択) -->
            <div id="menu-screen" class="fade-in space-y-4">
                <p class="text-xs font-bold text-slate-400 mb-4 uppercase tracking-widest">Training Categories</p>
                <div id="category-list" class="grid grid-cols-1 gap-3">
                    <!-- JSでここにボタンを生成 -->
                    <p class="text-center text-slate-300 py-10">Loading categories...</p>
                </div>
            </div>

            <!-- 2. クイズ画面 (前回までのUI) -->
            <div id="quiz-screen" class="hidden fade-in flex-1 flex flex-col">
                <div id="dialogue-box" class="mb-6 p-4 bg-slate-50 rounded-2xl border-l-4 border-indigo-400 text-sm italic text-slate-600 leading-relaxed"></div>
                <p id="question-text" class="text-lg font-bold text-slate-800 mb-8"></p>
                <div id="choice-area" class="space-y-3"></div>
            </div>

            <!-- 3. フィードバック画面 -->
            <div id="feedback-screen" class="hidden fade-in text-center">
                <div id="result-card" class="p-6 rounded-[2rem] mb-6 border-2 text-left">
                    <h2 id="result-title" class="text-2xl font-black mb-4 uppercase"></h2>
                    <div class="bg-white/60 p-4 rounded-xl mb-4 shadow-sm text-slate-800 font-bold" id="full-sentence"></div>
                    <p id="explanation-text" class="text-sm text-slate-600"></p>
                </div>
                <button onclick="nextQuestion()" class="w-full bg-slate-900 text-white py-5 rounded-2xl font-black shadow-xl active:scale-95 transition">CONTINUE →</button>
            </div>

            <!-- 4. 結果表示 -->
            <div id="summary-screen" class="hidden fade-in text-center py-10">
                <h2 class="text-4xl font-black mb-4">Well Done!</h2>
                <p id="summary-text" class="text-slate-600 mb-8"></p>
                <button onclick="location.reload()" class="w-full bg-indigo-600 text-white py-5 rounded-2xl font-black shadow-lg">Back to Menu</button>
            </div>
        </div>
    </div>

    <script>
        let allQuestions = [];
        let activePool = [];
        let currentIdx = 0;
        let score = 0;

        // 1. データ読み込み
        async function loadData() {
            try {
                const response = await fetch('quiz.json');
                allQuestions = await response.json();
                renderMenu();
            } catch (e) {
                document.getElementById('category-list').innerText = "Failed to load data.";
            }
        }

        // 2. メニュー生成
        function renderMenu() {
            // 重複なしのカテゴリーリストを作成
            const categories = [...new Set(allQuestions.map(q => q.category))];
            const list = document.getElementById('category-list');
            list.innerHTML = '';

            categories.forEach(cat => {
                const count = allQuestions.filter(q => q.category === cat).length;
                const btn = document.createElement('button');
                btn.className = "w-full flex justify-between items-center p-5 bg-white border border-slate-200 rounded-2xl hover:border-indigo-400 hover:bg-indigo-50 transition shadow-sm text-left group";
                btn.innerHTML = `
                    <div>
                        <span class="block font-bold text-slate-800 group-hover:text-indigo-600">${cat}</span>
                        <span class="text-[10px] text-slate-400 uppercase tracking-tighter">${count} Questions</span>
                    </div>
                    <span class="text-slate-300">→</span>
                `;
                btn.onclick = () => startQuiz(cat);
                list.appendChild(btn);
            });
        }

        // 3. クイズ開始
        function startQuiz(category) {
            activePool = allQuestions.filter(q => q.category === category);
            currentIdx = 0;
            score = 0;
            
            document.getElementById('header-subtitle').innerText = `Training: ${category}`;
            document.getElementById('menu-screen').classList.add('hidden');
            document.getElementById('quiz-screen').classList.remove('hidden');
            
            showQuestion();
        }

        function showQuestion() {
            const data = activePool[currentIdx];
            document.getElementById('dialogue-box').innerText = data.dialogue;
            document.getElementById('question-text').innerText = data.q;
            
            const area = document.getElementById('choice-area');
            area.innerHTML = '';
            data.choices.forEach(c => {
                const b = document.createElement('button');
                b.className = "w-full text-left p-5 bg-white border border-slate-200 rounded-xl hover:bg-indigo-50 hover:border-indigo-300 font-bold transition shadow-sm active:scale-[0.98]";
                b.innerText = c;
                b.onclick = () => checkAnswer(c);
                area.appendChild(b);
            });
        }

        function checkAnswer(val) {
            const data = activePool[currentIdx];
            const isCorrect = val.trim().toLowerCase() === data.a.toLowerCase();
            if(isCorrect) score++;

            document.getElementById('quiz-screen').classList.add('hidden');
            document.getElementById('feedback-screen').classList.remove('hidden');
            
            document.getElementById('result-title').innerText = isCorrect ? "Correct ✨" : "Miss ❌";
            document.getElementById('full-sentence').innerText = data.q.replace("(      )", data.a);
            document.getElementById('explanation-text').innerText = data.exp;
        }

        function nextQuestion() {
            currentIdx++;
            if (currentIdx >= activePool.length) {
                showSummary();
            } else {
                document.getElementById('feedback-screen').classList.add('hidden');
                document.getElementById('quiz-screen').classList.remove('hidden');
                showQuestion();
            }
        }

        function showSummary() {
            document.getElementById('feedback-screen').classList.add('hidden');
            document.getElementById('summary-screen').classList.remove('hidden');
            document.getElementById('summary-text').innerText = `${activePool.length}問中 ${score}問正解しました！`;
        }

        loadData();
    </script>
</body>
</html>
