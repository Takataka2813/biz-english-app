<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BizEnglish Pro - Quiz</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .hidden { display: none; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen flex items-center justify-center p-4 font-sans text-slate-800">

    <div id="app" class="max-w-md w-full bg-white rounded-2xl shadow-xl p-6 border border-slate-200">
        <!-- ヘッダー -->
        <div class="flex justify-between items-center mb-6">
            <h1 class="text-xl font-bold text-indigo-600">BizEnglish Pro</h1>
            <div id="mode-badge" class="text-xs bg-indigo-100 text-indigo-700 px-2 py-1 rounded-full font-bold">4択モード</div>
        </div>

        <!-- 進捗 -->
        <div class="w-full bg-slate-100 h-2 rounded-full mb-6">
            <div id="progress" class="bg-indigo-500 h-2 rounded-full transition-all duration-300" style="width: 0%"></div>
        </div>

        <!-- 問題エリア -->
        <div id="quiz-container">
            <p id="context" class="text-sm text-slate-500 mb-2 italic"></p>
            <p id="question" class="text-lg font-medium mb-6 leading-relaxed"></p>

            <!-- 4択用コンテナ -->
            <div id="choice-container" class="space-y-3"></div>

            <!-- タイピング用コンテナ -->
            <div id="typing-container" class="hidden space-y-4">
                <input type="text" id="type-input" placeholder="ここに入力..." class="w-full border-2 border-slate-200 rounded-lg p-3 focus:border-indigo-500 outline-none transition text-lg uppercase">
                <button onclick="checkTyping()" class="w-full bg-indigo-600 text-white py-3 rounded-lg font-bold hover:bg-indigo-700 transition">回答する</button>
            </div>

            <!-- 解説エリア -->
            <div id="feedback" class="hidden mt-6 p-4 rounded-lg">
                <p id="result-msg" class="font-bold mb-1"></p>
                <p id="explanation" class="text-sm leading-relaxed"></p>
                <button onclick="nextQuestion()" class="mt-4 w-full bg-slate-800 text-white py-2 rounded-lg text-sm">次へ進む</button>
            </div>
        </div>

        <!-- 設定切り替え -->
        <div class="mt-8 pt-4 border-t border-slate-100 flex justify-center">
            <button onclick="toggleMode()" class="text-xs text-slate-400 underline uppercase tracking-widest">モードを切り替える</button>
        </div>
    </div>

    <script>
        // 問題データ（先ほどの10問から一部抜粋）
        const quizData = [
            { context: "会議で丁寧に反対したい時", q: "I have some (      ) about this plan.", a: "RESERVATIONS", choices: ["COMPLAINTS", "RESERVATIONS", "NOISES", "BAD FEELINGS"], exp: "reservationsは『懸念』。ダイレクトにNoと言わない洗練された表現です。" },
            { context: "進捗を確認する時", q: "I'm just (      ) up on our meeting.", a: "FOLLOWING", choices: ["FOLLOWING", "CHECKING", "LOOKING", "ASKING"], exp: "Following upはビジネスメールの定番。相手を急かさない丁寧さがあります。" },
            { context: "要点をまとめる時", q: "To (      ), our main priority is cost.", a: "RECAP", choices: ["RECAP", "RETRY", "REUSE", "RETURN"], exp: "Recapは要約のカジュアルかつプロな表現。会議の締めに必須です。" }
        ];

        let currentIdx = 0;
        let isTypingMode = false;

        function initQuiz() {
            const data = quizData[currentIdx];
            document.getElementById('context').innerText = data.context;
            document.getElementById('question').innerText = data.q;
            document.getElementById('feedback').classList.add('hidden');
            document.getElementById('progress').style.width = `${(currentIdx / quizData.length) * 100}%`;

            if (isTypingMode) {
                showTypingMode();
            } else {
                showChoiceMode();
            }
        }

        function showChoiceMode() {
            document.getElementById('choice-container').classList.remove('hidden');
            document.getElementById('typing-container').classList.add('hidden');
            const container = document.getElementById('choice-container');
            container.innerHTML = '';
            quizData[currentIdx].choices.forEach(choice => {
                const btn = document.createElement('button');
                btn.className = "w-full text-left p-4 border border-slate-200 rounded-xl hover:bg-indigo-50 transition hover:border-indigo-300 font-medium";
                btn.innerText = choice;
                btn.onclick = () => checkChoice(choice);
                container.appendChild(btn);
            });
        }

        function showTypingMode() {
            document.getElementById('choice-container').classList.add('hidden');
            document.getElementById('typing-container').classList.remove('hidden');
            document.getElementById('type-input').value = '';
            document.getElementById('type-input').focus();
        }

        function checkChoice(selected) {
            const isCorrect = selected === quizData[currentIdx].a;
            showFeedback(isCorrect);
        }

        function checkTyping() {
            const input = document.getElementById('type-input').value.toUpperCase().trim();
            showFeedback(input === quizData[currentIdx].a);
        }

        function showFeedback(isCorrect) {
            const fb = document.getElementById('feedback');
            const msg = document.getElementById('result-msg');
            fb.classList.remove('hidden');
            fb.className = `mt-6 p-4 rounded-lg ${isCorrect ? 'bg-green-50 text-green-800' : 'bg-red-50 text-red-800'}`;
            msg.innerText = isCorrect ? "正解！ Excellent." : "惜しい！ Try again.";
            document.getElementById('explanation').innerText = quizData[currentIdx].exp;
        }

        function nextQuestion() {
            currentIdx++;
            if (currentIdx < quizData.length) {
                initQuiz();
            } else {
                alert("全てのトレーニングが完了しました！");
                currentIdx = 0;
                initQuiz();
            }
        }

        function toggleMode() {
            isTypingMode = !isTypingMode;
            document.getElementById('mode-badge').innerText = isTypingMode ? "タイピングモード" : "4択モード";
            initQuiz();
        }

        initQuiz();
    </script>
</body>
</html>
