<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BizEnglish Pro - Cloud Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .hidden { display: none; }
        .tab-active { border-bottom: 3px solid #4f46e5; color: #4f46e5; font-weight: 800; }
        @keyframes slideIn { from { opacity: 0; transform: translateX(20px); } to { opacity: 1; transform: translateX(0); } }
        .animate-slide { animation: slideIn 0.3s ease-out forwards; }
    </style>
</head>
<body class="bg-slate-100 min-h-screen flex justify-center items-start p-4 font-sans">

    <div id="app" class="max-w-md w-full bg-white rounded-[2.5rem] shadow-2xl overflow-hidden mt-2 flex flex-col min-h-[600px] border border-slate-200">
        <!-- HEADER -->
        <div class="bg-slate-900 p-6 text-white text-center">
            <h1 class="text-xl font-black italic tracking-tighter text-indigo-400">BIZPRO CLOUD</h1>
        </div>

        <!-- MAIN -->
        <div id="main-content" class="p-6 flex-1">
            <!-- ここにクイズ画面が表示される（中身は前回のスクリプトと同じ） -->
            <div id="loading" class="text-center py-20 text-slate-400 font-bold">LOADING DATA...</div>
            
            <div id="quiz-container" class="hidden">
                <!-- 前回のクイズUI要素（省略していますがJSで制御します） -->
                <div id="quiz-screen" class="animate-slide">
                    <div id="dialogue-box" class="mb-6 p-4 bg-slate-50 rounded-2xl border-l-4 border-indigo-400 text-sm italic text-slate-600 leading-relaxed"></div>
                    <p id="question-text" class="text-lg font-bold text-slate-800 mb-8"></p>
                    <div id="choice-area" class="space-y-3"></div>
                    <div id="typing-area" class="hidden">
                        <input type="text" id="type-input" class="w-full bg-slate-50 border-2 border-slate-200 rounded-2xl p-5 outline-none focus:border-indigo-500 font-bold">
                        <button onclick="checkAnswer(document.getElementById('type-input').value)" class="w-full mt-4 bg-indigo-600 text-white py-5 rounded-2xl font-black shadow-lg shadow-indigo-100">SUBMIT</button>
                    </div>
                </div>

                <div id="feedback-screen" class="hidden animate-slide text-center">
                    <div id="result-card" class="p-6 rounded-[2rem] mb-6 border-2 text-left">
                        <h2 id="result-title" class="text-2xl font-black mb-4"></h2>
                        <div class="bg-white/60 p-4 rounded-xl mb-4">
                            <p id="full-sentence" class="text-slate-800 font-bold"></p>
                        </div>
                        <p id="explanation-text" class="text-sm text-slate-700"></p>
                    </div>
                    <button onclick="nextQuestion()" class="w-full bg-slate-900 text-white py-5 rounded-2xl font-black shadow-xl">CONTINUE →</button>
                </div>

                <div id="summary-screen" class="hidden text-center py-10 animate-slide">
                    <h2 class="text-4xl font-black text-slate-900 mb-6">FINISH!</h2>
                    <button onclick="location.reload()" class="w-full bg-indigo-600 text-white py-5 rounded-2xl font-black">RESTART</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        let masterData = [];
        let currentIdx = 0;
        let mode = 'choice';

        // 外部JSON読み込み
        async function loadQuestions() {
            try {
                const response = await fetch('quiz.json');
                masterData = await response.json();
                document.getElementById('loading').classList.add('hidden');
                document.getElementById('quiz-container').classList.remove('hidden');
                initQuiz();
            } catch (e) {
                document.getElementById('loading').innerText = "FAILED TO LOAD DATA";
            }
        }

        function initQuiz() {
            const data = masterData[currentIdx];
            document.getElementById('quiz-screen').classList.remove('hidden');
            document.getElementById('feedback-screen').classList.add('hidden');
            document.getElementById('dialogue-box').innerText = data.dialogue;
            document.getElementById('question-text').innerText = data.q;
            
            if (mode === 'choice') {
                const area = document.getElementById('choice-area');
                area.innerHTML = '';
                data.choices.forEach(c => {
                    const b = document.createElement('button');
                    b.className = "w-full text-left p-5 bg-white border-2 border-slate-100 rounded-2xl hover:border-indigo-300 font-bold shadow-sm mb-3";
                    b.innerText = c;
                    b.onclick = () => checkAnswer(c);
                    area.appendChild(b);
                });
            }
        }

        function checkAnswer(val) {
            const data = masterData[currentIdx];
            const isCorrect = val.trim().toLowerCase() === data.a.toLowerCase();
            document.getElementById('quiz-screen').classList.add('hidden');
            document.getElementById('feedback-screen').classList.remove('hidden');
            document.getElementById('result-title').innerText = isCorrect ? "CORRECT ✨" : "MISS ❌";
            document.getElementById('full-sentence').innerText = data.q.replace("(      )", data.a);
            document.getElementById('explanation-text').innerText = data.exp;
        }

        function nextQuestion() {
            currentIdx++;
            if (currentIdx >= masterData.length) {
                document.getElementById('feedback-screen').classList.add('hidden');
                document.getElementById('summary-screen').classList.remove('hidden');
            } else {
                initQuiz();
            }
        }

        loadQuestions();
    </script>
</body>
</html>
