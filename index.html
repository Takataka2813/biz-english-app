<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BizPro English | Modern</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #4f46e5;
            --primary-hover: #4338ca;
            --bg-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --text-main: #1f2937;
            --text-muted: #6b7280;
            --surface: #ffffff;
            --correct: #10b981;
            --wrong: #ef4444;
        }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: var(--bg-gradient);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            color: var(--text-main);
        }

        #app {
            background: var(--surface);
            width: 90%;
            max-width: 450px;
            min-height: 550px;
            padding: 32px;
            border-radius: 24px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
            display: flex;
            flex-direction: column;
            position: relative;
            overflow: hidden;
        }

        h1 {
            text-align: center;
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 8px;
            background: linear-gradient(to right, #4f46e5, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .subtitle {
            text-align: center;
            color: var(--text-muted);
            font-size: 14px;
            margin-bottom: 32px;
        }

        .hidden { display: none !important; }

        /* Buttons */
        button {
            all: unset;
            display: block;
            width: 100%;
            padding: 16px 0;
            margin: 12px 0;
            text-align: center;
            background: #f3f4f6;
            color: var(--text-main);
            font-weight: 600;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s ease;
            box-sizing: border-box;
        }

        button:hover { background: #e5e7eb; transform: translateY(-2px); }
        
        .btn-primary {
            background: var(--primary);
            color: white;
        }
        .btn-primary:hover {
            background: var(--primary-hover);
            box-shadow: 0 10px 15px -3px rgba(79, 70, 229, 0.4);
        }

        .choice-btn {
            background: #ffffff;
            border: 2px solid #f3f4f6;
            padding: 14px 20px;
            text-align: left;
            font-size: 15px;
        }
        .choice-btn:hover { border-color: var(--primary); background: #f9fafb; }

        .correct { background: var(--correct) !important; color: white !important; border-color: var(--correct) !important; }
        .wrong { background: var(--wrong) !important; color: white !important; border-color: var(--wrong) !important; }

        /* Progress Bar */
        .progress-container {
            width: 100%;
            height: 6px;
            background: #e5e7eb;
            border-radius: 3px;
            margin-bottom: 24px;
        }
        .progress-bar {
            height: 100%;
            background: var(--primary);
            border-radius: 3px;
            width: 0%;
            transition: width 0.4s ease;
        }

        /* Feedback Area */
        #feedback {
            margin-top: 20px;
            padding: 20px;
            border-radius: 16px;
            background: #f9fafb;
            animation: slideUp 0.3s ease-out;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .dialogue-box {
            font-size: 14px;
            color: var(--text-muted);
            line-height: 1.6;
            margin-bottom: 12px;
            padding-left: 12px;
            border-left: 3px solid #e5e7eb;
        }

        #error-message {
            color: var(--wrong);
            background: #fee2e2;
            padding: 12px;
            border-radius: 8px;
            font-size: 12px;
            margin-bottom: 10px;
        }

        /* Result Screen */
        .score-circle {
            width: 120px;
            height: 120px;
            margin: 40px auto;
            border: 8px solid var(--primary);
            border-radius: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            font-weight: 700;
            color: var(--primary);
        }
    </style>
</head>
<body>

<div id="app">
    <div id="error-message" class="hidden"></div>
    
    <!-- Header -->
    <div id="header">
        <h1>BizPro English</h1>
        <p class="subtitle">Elevate your professional English</p>
    </div>

    <!-- 1. Course Selection -->
    <div id="course-screen">
        <button class="btn-primary" onclick="selectCourse('beginner')">Beginner</button>
        <button class="btn-primary" onclick="selectCourse('intermediate')">Intermediate</button>
        <button class="btn-primary" onclick="selectCourse('advanced')">Advanced</button>
    </div>

    <!-- 2. Theme Selection -->
    <div id="theme-screen" class="hidden">
        <div id="theme-list"></div>
        <button onclick="backToCourse()" style="margin-top: 20px; color: var(--text-muted); background: transparent;">← Back to Courses</button>
    </div>

    <!-- 3. Quiz Screen -->
    <div id="quiz-screen" class="hidden">
        <div class="progress-container"><div id="progress-bar" class="progress-bar"></div></div>
        <div id="dialogue" class="dialogue-box"></div>
        <div id="question-text" style="font-weight: 700; font-size: 18px; margin-bottom: 20px;"></div>
        <div id="choices"></div>
        
        <div id="feedback" class="hidden">
            <div style="display: flex; align-items: center; margin-bottom: 8px;">
                <span id="result-emoji" style="font-size: 24px; margin-right: 8px;"></span>
                <strong id="result-text"></strong>
            </div>
            <p id="explanation" style="font-size: 14px; color: var(--text-muted); margin: 0;"></p>
            <button class="btn-primary" onclick="nextQuestion()" style="margin-top: 16px;">Next Question</button>
        </div>
    </div>

    <!-- 4. Result Screen -->
    <div id="result-screen" class="hidden">
        <h2 style="text-align:center;">Quiz Completed!</h2>
        <div class="score-circle" id="final-score-circle">0/10</div>
        <button class="btn-primary" onclick="location.reload()">Try Again</button>
    </div>
</div>

<script>
    let allData = [];
    let currentQuestions = [];
    let currentIndex = 0;
    let score = 0;

    const getPath = (level) => `${level}.json`;

    async function selectCourse(level) {
        const errDiv = document.getElementById('error-message');
        errDiv.classList.add('hidden');
        
        try {
            const response = await fetch(getPath(level));
            if (!response.ok) throw new Error("JSON file not found.");
            allData = await response.json();
            
            document.getElementById('course-screen').classList.add('hidden');
            document.getElementById('theme-screen').classList.remove('hidden');
            generateThemeButtons();
        } catch (e) {
            errDiv.innerText = "Error loading data. Make sure JSON files are in the same folder.";
            errDiv.classList.remove('hidden');
        }
    }

    function generateThemeButtons() {
        const themeList = document.getElementById('theme-list');
        themeList.innerHTML = "";
        const categories = [...new Set(allData.map(q => q.category))].sort();
        
        categories.forEach(cat => {
            const btn = document.createElement('button');
            btn.innerText = cat;
            btn.onclick = () => startQuiz(cat);
            themeList.appendChild(btn);
        });

        const allBtn = document.createElement('button');
        allBtn.innerText = "🌟 Shuffle All Themes";
        allBtn.style.background = "linear-gradient(to right, #4f46e5, #764ba2)";
        allBtn.style.color = "white";
        allBtn.onclick = () => startQuiz('ALL');
        themeList.appendChild(allBtn);
    }

    function startQuiz(category) {
        currentQuestions = category === 'ALL' ? [...allData] : allData.filter(q => q.category === category);
        currentQuestions.sort(() => Math.random() - 0.5);
        currentQuestions = currentQuestions.slice(0, 10);
        currentIndex = 0;
        score = 0;

        document.getElementById('theme-screen').classList.add('hidden');
        document.getElementById('header').classList.add('hidden');
        document.getElementById('quiz-screen').classList.remove('hidden');
        showQuestion();
    }

    function showQuestion() {
        const q = currentQuestions[currentIndex];
        const progress = ((currentIndex) / currentQuestions.length) * 100;
        document.getElementById('progress-bar').style.width = progress + "%";
        
        document.getElementById('dialogue').innerText = q.dialogue;
        document.getElementById('question-text').innerText = q.q;
        document.getElementById('feedback').classList.add('hidden');
        
        const choicesDiv = document.getElementById('choices');
        choicesDiv.innerHTML = "";
        
        q.choices.forEach(choice => {
            const btn = document.createElement('button');
            btn.className = "choice-btn";
            btn.innerText = choice;
            btn.onclick = () => checkAnswer(choice, btn);
            choicesDiv.appendChild(btn);
        });
    }

    function checkAnswer(selected, btn) {
        const q = currentQuestions[currentIndex];
        const allBtns = document.querySelectorAll('#choices button');
        allBtns.forEach(b => { b.disabled = true; b.style.opacity = "0.7"; });
        btn.style.opacity = "1";

        if (selected === q.a) {
            btn.classList.add('correct');
            document.getElementById('result-emoji').innerText = "✨";
            document.getElementById('result-text').innerText = "Correct!";
            score++;
        } else {
            btn.classList.add('wrong');
            document.getElementById('result-emoji').innerText = "💡";
            document.getElementById('result-text').innerText = "Not quite...";
            allBtns.forEach(b => {
                if(b.innerText === q.a) b.classList.add('correct');
            });
        }

        document.getElementById('explanation').innerText = q.exp;
        document.getElementById('feedback').classList.remove('hidden');
    }

    function nextQuestion() {
        currentIndex++;
        if (currentIndex < currentQuestions.length) {
            showQuestion();
        } else {
            showResult();
        }
    }

    function showResult() {
        document.getElementById('progress-bar').style.width = "100%";
        document.getElementById('quiz-screen').classList.add('hidden');
        document.getElementById('result-screen').classList.remove('hidden');
        document.getElementById('final-score-circle').innerText = `${score}/${currentQuestions.length}`;
    }

    function backToCourse() {
        document.getElementById('theme-screen').classList.add('hidden');
        document.getElementById('course-screen').classList.remove('hidden');
    }
</script>

</body>
</html>
