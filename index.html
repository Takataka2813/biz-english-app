<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BizPro English</title>
    <style>
        body { font-family: sans-serif; background-color: #f4f7f6; display: flex; justify-content: center; padding: 20px; }
        #app { background: white; width: 100%; max-width: 500px; padding: 20px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        h1 { text-align: center; color: #2c3e50; font-size: 24px; }
        .hidden { display: none; }
        button { 
            display: block; width: 100%; padding: 15px; margin: 10px 0; 
            font-size: 16px; cursor: pointer; border-radius: 10px; border: none; 
            background-color: #3498db; color: white; transition: 0.3s;
        }
        button:hover { background-color: #2980b9; }
        .theme-grid { display: grid; grid-template-columns: 1fr; gap: 10px; }
        .choice-btn { background-color: #ecf0f1; color: #2c3e50; text-align: left; }
        .choice-btn:hover { background-color: #bdc3c7; }
        .correct { background-color: #2ecc71 !important; color: white; }
        .wrong { background-color: #e74c3c !important; color: white; }
        #feedback { margin-top: 15px; padding: 15px; border-radius: 8px; line-height: 1.5; border-left: 5px solid #3498db; background: #f9f9f9; }
        .progress { text-align: center; font-size: 14px; color: #7f8c8d; margin-bottom: 10px; }
    </style>
</head>
<body>

<div id="app">
    <h1>BizPro English</h1>

    <!-- 1. コース選択画面 -->
    <div id="course-screen">
        <p style="text-align:center;">難易度を選んでください</p>
        <button onclick="selectCourse('beginner')">初級 (Beginner)</button>
        <button onclick="selectCourse('intermediate')">中級 (Intermediate)</button>
        <button onclick="selectCourse('advanced')">上級 (Advanced)</button>
    </div>

    <!-- 2. テーマ選択画面 -->
    <div id="theme-screen" class="hidden">
        <h2 id="selected-level-title" style="text-align:center; font-size: 18px;"></h2>
        <div id="theme-list" class="theme-grid"></div>
        <button onclick="backToCourse()" style="background-color:#95a5a6;">戻る</button>
    </div>

    <!-- 3. クイズ画面 -->
    <div id="quiz-screen" class="hidden">
        <div class="progress">Question <span id="current-idx">1</span> / <span id="total-idx">10</span></div>
        <p id="dialogue" style="font-style: italic; color: #7f8c8d; margin-bottom: 5px;"></p>
        <p id="question-text" style="font-weight: bold; font-size: 18px; margin-top: 0;"></p>
        <div id="choices"></div>
        <div id="feedback" class="hidden">
            <strong id="result-text"></strong><br>
            <span id="explanation"></span>
            <button id="next-btn" onclick="nextQuestion()">次へ</button>
        </div>
    </div>

    <!-- 4. 結果画面 -->
    <div id="result-screen" class="hidden">
        <h2 style="text-align:center;">結果発表</h2>
        <p id="final-score" style="text-align:center; font-size: 24px; font-weight: bold;"></p>
        <button onclick="location.reload()">タイトルに戻る</button>
    </div>
</div>

<script>
    let allData = [];
    let currentQuestions = [];
    let currentIndex = 0;
    let score = 0;

    // コースを選択してJSONを読み込む
    async function selectCourse(level) {
        try {
            const response = await fetch(`${level}.json`);
            allData = await response.json();
            
            document.getElementById('course-screen').classList.add('hidden');
            document.getElementById('theme-screen').classList.remove('hidden');
            document.getElementById('selected-level-title').innerText = level.toUpperCase() + " コース";
            
            generateThemeButtons();
        } catch (e) {
            alert("データの読み込みに失敗しました。");
        }
    }

    // テーマボタンを動的に生成
    function generateThemeButtons() {
        const themeList = document.getElementById('theme-list');
        themeList.innerHTML = "";
        
        // カテゴリの重複を除去してリスト化
        const categories = [...new Set(allData.map(q => q.category))];
        
        categories.forEach(cat => {
            const btn = document.createElement('button');
            btn.className = "choice-btn";
            btn.innerText = cat;
            btn.onclick = () => startQuiz(cat);
            themeList.appendChild(btn);
        });

        // 全件ランダムボタン
        const allBtn = document.createElement('button');
        allBtn.innerText = "すべてのテーマからランダムに出題";
        allBtn.onclick = () => startQuiz('ALL');
        themeList.appendChild(allBtn);
    }

    // クイズ開始
    function startQuiz(category) {
        if (category === 'ALL') {
            currentQuestions = [...allData];
        } else {
            currentQuestions = allData.filter(q => q.category === category);
        }

        // シャッフル
        currentQuestions.sort(() => Math.random() - 0.5);
        // 最大10問に制限（お好みで調整してください）
        currentQuestions = currentQuestions.slice(0, 10);

        currentIndex = 0;
        score = 0;

        document.getElementById('theme-screen').classList.add('hidden');
        document.getElementById('quiz-screen').classList.remove('hidden');
        showQuestion();
    }

    function showQuestion() {
        const q = currentQuestions[currentIndex];
        document.getElementById('current-idx').innerText = currentIndex + 1;
        document.getElementById('total-idx').innerText = currentQuestions.length;
        document.getElementById('dialogue').innerText = q.dialogue;
        document.getElementById('question-text').innerText = q.q;
        document.getElementById('feedback').classList.add('hidden');
        
        const choicesDiv = document.getElementById('choices');
        choicesDiv.innerHTML = "";
        
        q.choices.forEach(choice => {
            const btn = document.createElement('button');
            btn.className = "choice-btn";
            btn.innerText = choice;
            btn.onclick = () => checkAnswer(choice, btn);
            choicesDiv.appendChild(btn);
        });
    }

    function checkAnswer(selected, btn) {
        const q = currentQuestions[currentIndex];
        const allBtns = document.querySelectorAll('#choices button');
        allBtns.forEach(b => b.disabled = true);

        if (selected === q.a) {
            btn.classList.add('correct');
            document.getElementById('result-text').innerText = "✅ 正解！";
            score++;
        } else {
            btn.classList.add('wrong');
            document.getElementById('result-text').innerText = "❌ 不正解...";
            // 正解のボタンをハイライト
            allBtns.forEach(b => {
                if(b.innerText === q.a) b.classList.add('correct');
            });
        }

        document.getElementById('explanation').innerText = q.exp;
        document.getElementById('feedback').classList.remove('hidden');
    }

    function nextQuestion() {
        currentIndex++;
        if (currentIndex < currentQuestions.length) {
            showQuestion();
        } else {
            showResult();
        }
    }

    function showResult() {
        document.getElementById('quiz-screen').classList.add('hidden');
        document.getElementById('result-screen').classList.remove('hidden');
        document.getElementById('final-score').innerText = `${currentQuestions.length}問中 ${score}問正解！`;
    }

    function backToCourse() {
        document.getElementById('theme-screen').classList.add('hidden');
        document.getElementById('course-screen').classList.remove('hidden');
    }
</script>

</body>
</html>
